<!DOCTYPE html>
<html>
<head>
    <title>OBD Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="layout">

    <!-- ПРИБОРКА -->
    <div class="cluster">

        <div class="gauge">
            <canvas id="speed" width="300" height="300"></canvas>
            <div class="value" id="speedText">0 km/h</div>
        </div>

        <div class="gauge">
            <div class="gear" id="gearText">N</div>
            <div class="value">GEAR</div>
        </div>

        <div class="gauge">
            <canvas id="rpm" width="300" height="300"></canvas>
            <div class="value" id="rpmText">0 rpm</div>
        </div>

        <div class="gauge">
            <canvas id="temp" width="300" height="300"></canvas>
            <div class="value" id="tempText">0 °C</div>
        </div>

    </div>

    <!-- ПАНЕЛЬ ДИАГНОСТИКИ -->
    <div class="sidebar">

        <div class="panel">
            <h3>MISFIRE</h3>

            <div id="cyl1" class="cyl">Cylinder 1 ✔</div>
            <div id="cyl2" class="cyl">Cylinder 2 ✔</div>
            <div id="cyl3" class="cyl">Cylinder 3 ✔</div>
            <div id="cyl4" class="cyl">Cylinder 4 ✔</div>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</body>
</html>
